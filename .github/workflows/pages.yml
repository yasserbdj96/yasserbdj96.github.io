# Simple workflow for deploying static content to Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Pages
        uses: actions/configure-pages@v2

      # Fix: Preload upload-artifact to avoid missing info error
      - name: Preload upload-artifact@v3
        uses: actions/upload-artifact@v3
        with:
          name: dummy
          path: README.md  # replace with a small file you have in repo

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1  # or @v2 if available
        with:
          path: './Front-End/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v1
